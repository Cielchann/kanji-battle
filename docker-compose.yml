services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jlpt_kanji_battle
      POSTGRES_USER: jlpt
      POSTGRES_PASSWORD: jlpt_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jlpt -d jlpt_kanji_battle"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
